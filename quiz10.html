<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><title>Quiz 10</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; background: #fff; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .q-title { font-size: 18px; font-weight: bold; color: #0056b3; margin: 20px 0 10px 0; line-height: 1.4; }
        label { display: block; padding: 12px; background: #f8f9fa; margin-bottom: 8px; border-radius: 5px; cursor: pointer; border: 1px solid #dee2e6; line-height: 1.4; }
        label:hover { background: #e2e6ea; }
        .submit-btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        #result { font-size: 24px; font-weight: bold; color: red; text-align: center; margin-top: 20px; }
        a { display: block; text-align: center; margin-top: 20px; color: #0056b3; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; border-bottom: 2px solid #0056b3; padding-bottom: 10px;">ĐỀ THI - QUIZ 10 (BỔ SUNG)</h2>
        <div id="quiz-content"></div>
        <button class="submit-btn" onclick="chamDiem()">NỘP BÀI</button>
        <div id="result"></div>
        <a href="menu.html">← Quay lại Menu</a>
    </div>

    <script>
        const quiz10 = [
            {q: "Câu 1: Nhận định sau đây đúng hay sai: “Đưa hổ cửa trước, rước beo cửa sau” là câu Nguyễn Ái Quốc nói về chủ trương cứu nước của Phan Chu Trinh.", o: ["A. Đúng", "B. Sai"], a: 1},
            {q: "Câu 2: Nội dung nào không thể hiện tính dân tộc của nhà nước ta?", o: ["A. Thực hiện đại đoàn kết dân tộc", "B. Nhà nước của dân, do dân và vì dân", "C. Kế thừa và phát huy những truyền thống, bản sắc tốt đẹp...", "D. Chăm lo lợi ích mọi mặt cho tất cả các dân tộc"], a: 1},
            {q: "Câu 3: “Đưa hổ cửa trước, rước beo cửa sau” là câu Nguyễn Ái Quốc nói về chủ trương của ai?", o: ["A. Ngô Đình Diệm", "B. Vua Bảo Đại", "C. Phan Bội Châu", "D. Võ Nguyên Giáp"], a: 2},
            {q: "Câu 4: Mục tiêu tổng quát khi kết thúc thời kỳ quá độ ở nước ta là xây dựng được về cơ bản nền tảng kinh tế của chủ nghĩa xã hội... Đúng hay sai?", o: ["A. Đúng", "B. Sai"], a: 0},
            {q: "Câu 5: “Khi mâu thuẫn với Pháp... có ý thức dân tộc... nhưng do lo sợ bị cách mạng đánh đổ họ thường dao động ngả nghiêng...”. Chỉ giai cấp nào?", o: ["A. Giai cấp tư sản", "B. Nông dân", "C. Công nhân", "D. Tiểu tư sản"], a: 0},
            {q: "Câu 6: Ai đã khẳng định: “Nói kinh tế thị trường định hướng xã hội chủ nghĩa có nghĩa đây không phải là kinh tế thị trường tự do theo kiểu tư bản chủ nghĩa...”", o: ["A. Nguyễn Phú Trọng", "B. Trương Tấn Sang", "C. Trần Đức Lương", "D. Hồ Chí Minh"], a: 0},
            {q: "Câu 7: Điền từ còn thiếu vào chỗ trống: “Về xây dựng và phát triển nền văn hoá …………. tiên tiến đậm đà bản sắc dân tộc”.", o: ["A. chúng ta", "B. Việt Nam", "C. nước ta", "D. kháng chiến"], a: 1},
            {q: "Câu 8: Theo Hồ Chí Minh, muốn xây dựng chủ nghĩa xã hội trước hết cần có cái gì?", o: ["A. Con người toàn diện", "B. Con người xã hội chủ nghĩa", "C. Kinh tế phát triển", "D. Khoa học – kỹ thuật"], a: 1},
            {q: "Câu 9: Theo Hồ Chí Minh, ưu điểm lớn nhất của chủ nghĩa Tam dân của Tôn Trung Sơn đối với nước ta là:", o: ["A. Chống phong kiến", "B. Phù hợp với điều kiện thực tế nước ta", "C. Đem lại độc lập, tự do", "D. Đấu tranh vì tự do, dân chủ"], a: 1},
            {q: "Câu 10: Trong thực hiện nhiệm vụ bảo vệ Tổ quốc luôn phải?", o: ["A. Xác định được kẻ thù và các thế lực thù địch", "B. Chia rẽ nội bộ kẻ thù", "C. Sẵn sàng chiến đấu bảo vệ Tổ quốc", "D. Nâng cao ý thức trách nhiệm và tinh thần cảnh giác"], a: 3},
            {q: "Câu 11: Con người xã hội chủ nghĩa là con người có tinh thần...; là con người có lối sống tình nghĩa, có tính cộng đồng cao.", o: ["A. Yêu nước chân chính và tinh thần quốc tế trong sáng", "B. Tinh thần quốc tế xã hội chủ nghĩa", "C. Yêu nước nồng nàn và tinh thần quốc tế vô tư", "D. Yêu nước và tinh thần quốc tế vô sản"], a: 0},
            {q: "Câu 12: Theo Ph. Ăngghen, vấn đề cơ bản lớn của triết học là vấn đề về:", o: ["A. Vật chất", "B. Ý thức", "C. Quy luật chung nhất của thế giới", "D. Mối quan hệ giữa tư duy và tồn tại"], a: 3},
            {q: "Câu 13: Xây dựng chiến lược quốc gia về nâng cao sức khoẻ, tầm vóc con người là tăng tuổi thọ, cải thiện chất lượng giống nòi?", o: ["A. Đúng", "B. Sai"], a: 0},
            {q: "Câu 14: Toàn cầu hoá nghĩa là?", o: ["A. Hợp tác song phương", "B. Sự hợp tác đa phương giữa các quốc gia", "C. Hợp tác của các nước đang phát triển", "D. Hợp tác của các nước phát triển"], a: 1},
            {q: "Câu 15: Quyền dân tộc tự quyết là quyền ……. đối với vận mệnh của dân tộc mình.", o: ["A. Tự lực", "B. Tự do", "C. Làm chủ", "D. Tự chủ"], a: 2}
        ];

        let html = '';
        quiz10.forEach((q, i) => {
            html += `<div class="q-title">${q.q}</div>`;
            q.o.forEach((opt, j) => {
                html += `<label><input type="radio" name="q${i}" value="${j}"> ${opt}</label>`;
            });
        });
        document.getElementById('quiz-content').innerHTML = html;

        function chamDiem() {
            let score = 0;
            quiz10.forEach((q, i) => {
                let checked = document.querySelector(`input[name="q${i}"]:checked`);
                if(checked && parseInt(checked.value) === q.a) score++;
            });
            document.getElementById('result').innerText = `Kết quả: ${score} / 15 câu`;
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
